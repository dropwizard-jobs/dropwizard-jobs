# This workflow publishes SNAPSHOT artifacts to Maven Central Snapshots via the Sonatype Central Portal
# Triggered on every push to master

name: Maven Publish Snapshot

on:
    push:
        branches:
            - master
            - publish

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                java-version: '25'
                distribution: "temurin"
                server-id: snapshot
                server-username: MAVEN_USERNAME
                server-password: MAVEN_PASSWORD

            - name: Publish Snapshot to Maven Central
              run: mvn --batch-mode -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} deploy
              env:
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
