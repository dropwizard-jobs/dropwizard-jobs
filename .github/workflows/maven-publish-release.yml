# This workflow will build a package using Maven and then publish it to Maven Central when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Publish Release

on:
    release:
        types: [created]
    push:
        tags:
            - "v*"

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v5
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: "25"
                  distribution: "temurin"
                  server-id: sonatype-nexus-staging
                  server-username: MAVEN_USERNAME
                  server-password: MAVEN_PASSWORD

            - name: Set release version
              run: |
                  VERSION=${{ github.ref_name }}
                  VERSION=${VERSION#v}
                  mvn --batch-mode versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

            - name: Publish to GitHub Packages
              run: mvn --batch-mode deploy
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish to Maven Central
              run: mvn --batch-mode -Drelease deploy
              env:
                  MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.SONATYPE_TOKEN }}
                  MAVEN_GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
