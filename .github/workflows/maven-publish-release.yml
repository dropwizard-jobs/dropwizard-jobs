# This workflow publishes release artifacts to Maven Central via the Sonatype Central Portal
# Triggered when a GitHub release is created or a tag starting with 'v' is pushed

name: Maven Publish Release

on:
    release:
        types: [created]
    push:
        tags:
            - "v*"

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v5
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: "25"
                  distribution: "temurin"
                  server-id: central
                  server-username: MAVEN_USERNAME
                  server-password: MAVEN_PASSWORD

            - name: Set release version
              run: |
                  VERSION=${{ github.ref_name }}
                  VERSION=${VERSION#v}
                  mvn --batch-mode versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

            - name: Import GPG key
              run: |
                  echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

            - name: Publish to Maven Central
              run: mvn --batch-mode -Drelease -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} deploy
              env:
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
